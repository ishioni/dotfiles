[settings]
env_cache = true
env_cache_ttl = "6h"
experimental = true
disable_hints = ["*"]
pipx.uvx = true

always_keep_download = false                   # deleted after install by default
always_keep_install = false                    # deleted on failure by default

[tools]
"node" = "24"
"aqua:astral-sh/uv" = "latest"

[plugins]
1password-env = "https://github.com/kujenga/mise-env-1password"
